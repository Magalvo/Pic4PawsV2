<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "accent-teal": "#3d9a9c"
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #ec5b13;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col pb-10">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between p-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold flex-1 text-center pr-10">Upload New Pet</h1>
</header>
<main class="flex-1 px-4 space-y-6">
<!-- Photo Upload Area -->
<section>
<h3 class="text-sm font-semibold uppercase tracking-wider text-primary mb-3">Pet Photo</h3>
<div class="relative group">
<div class="flex flex-col items-center justify-center gap-4 rounded-xl border-2 border-dashed border-primary/30 bg-primary/5 px-6 py-12 transition-all hover:border-primary/60 hover:bg-primary/10 cursor-pointer">
<div class="size-16 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-4xl">add_a_photo</span>
</div>
<div class="text-center">
<p class="text-base font-bold">Tap to add photo</p>
<p class="text-xs opacity-70">JPG, PNG up to 10MB</p>
</div>
<button class="bg-primary text-white text-sm font-bold py-2 px-6 rounded-lg shadow-sm">
                            Choose File
                        </button>
</div>
</div>
</section>
<!-- Basic Info Fields -->
<section class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Pet Name</label>
<input class="w-full h-12 rounded-xl border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-primary text-base px-4" placeholder="e.g. Buddy" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Pet Type</label>
<select class="w-full h-12 rounded-xl border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-primary text-base px-4">
<option value="">Select Type</option>
<option value="dog">Dog</option>
<option value="cat">Cat</option>
<option value="rabbit">Rabbit</option>
<option value="other">Other</option>
</select>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Age</label>
<input class="w-full h-12 rounded-xl border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-primary text-base px-4" placeholder="e.g. 2 years" type="text"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">Breed</label>
<input class="w-full h-12 rounded-xl border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-primary text-base px-4" placeholder="e.g. Golden Retriever" type="text"/>
</div>
</section>
<!-- Traits Selection -->
<section>
<div class="flex items-center justify-between mb-3">
<h3 class="text-sm font-semibold uppercase tracking-wider text-accent-teal">Traits &amp; Tags</h3>
<button class="text-accent-teal flex items-center gap-1 text-sm font-medium">
<span class="material-symbols-outlined text-sm">add_circle</span>
                        Add New
                    </button>
</div>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1.5 rounded-full bg-accent-teal/10 text-accent-teal text-sm font-medium border border-accent-teal/20 flex items-center gap-1">
                        #GoodWithCats <span class="material-symbols-outlined text-xs">close</span>
</span>
<span class="px-3 py-1.5 rounded-full bg-accent-teal/10 text-accent-teal text-sm font-medium border border-accent-teal/20 flex items-center gap-1">
                        #HighEnergy <span class="material-symbols-outlined text-xs">close</span>
</span>
<span class="px-3 py-1.5 rounded-full bg-accent-teal/10 text-accent-teal text-sm font-medium border border-accent-teal/20 flex items-center gap-1">
                        #HouseTrained <span class="material-symbols-outlined text-xs">close</span>
</span>
<span class="px-3 py-1.5 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-400 text-sm font-medium border border-transparent">
                        #KidFriendly
                    </span>
<span class="px-3 py-1.5 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-400 text-sm font-medium border border-transparent">
                        #Calm
                    </span>
</div>
</section>
<!-- Bio -->
<section>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium px-1">About Me</label>
<textarea class="w-full rounded-xl border-primary/20 bg-white dark:bg-background-dark focus:border-primary focus:ring-primary text-base p-4 resize-none" placeholder="Tell us about the pet's personality, history, and needs..." rows="4"></textarea>
</div>
</section>
<!-- Action Buttons -->
<section class="pt-4 pb-8 space-y-3">
<button class="w-full h-14 bg-primary text-white rounded-xl font-bold text-lg shadow-lg shadow-primary/20 hover:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined">publish</span>
                    Publish to Feed
                </button>
<button class="w-full h-14 bg-transparent text-slate-500 dark:text-slate-400 rounded-xl font-medium text-base hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Save Draft
                </button>
</section>
</main>
</div>
</body></html>
